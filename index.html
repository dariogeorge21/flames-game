<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAMES - Destiny Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container">
        <div class="header">
            <h1>🔥 FLAMES 🔥</h1>
            <p class="subtitle">Discover your relationship destiny!</p>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <label for="name1">First Name</label>
                <input type="text" id="name1" placeholder="e.g., Romeo" autocomplete="off">
            </div>
            
            <div class="divider">
                <span>+</span>
            </div>

            <div class="input-wrapper">
                <label for="name2">Second Name</label>
                <input type="text" id="name2" placeholder="e.g., Juliet" autocomplete="off">
            </div>
        </div>

        <button id="calculate-btn">Calculate Destiny</button>

        <div id="result-section" class="hidden">
            <div class="result-box">
                <h2 id="result-letter">F</h2>
                <h3 id="result-title">Friends</h3>
                <p id="result-desc">You are meant to be good friends!</p>
            </div>
            <button id="reset-btn" class="secondary-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
